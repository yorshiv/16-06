*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#050508;--bg2:#09090f;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--neon:#00f5d4;--neon2:#7b2fff;--neon3:#ff2d78;--text:#f0eeff;--muted:#8a8aaa;--font-display:'Bebas Neue',sans-serif;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem}h1{font-family:var(--font-display);font-size:10rem;background:linear-gradient(135deg,#fff,var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:1rem}h2{font-family:var(--font-head);font-size:1.8rem;margin-bottom:1rem}p{color:var(--muted);font-size:1.1rem;margin-bottom:2rem;max-width:600px}.button-group{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}a{display:inline-block;padding:14px 32px;background:linear-gradient(135deg,var(--neon),var(--neon2));color:#fff;text-decoration:none;border-radius:100px;font-weight:700;transition:transform 0.2s}.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.nav-logo{position:fixed;top:20px;left:20px;font-family:var(--font-display);font-size:1.5rem;text-decoration:none;color:var(--text)}.logo-wow{background:linear-gradient(135deg,var(--neon),var(--neon2),var(--neon3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
